<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leave Me Alone</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="popup">
      <header class="hero">
        <div class="hero-logo-container">
          <img class="hero-logo" src="icons/icon-128.png" alt="Leave Me Alone logo" />
        </div>
        <h1 class="hero-title">Leave Me Alone</h1>
        <p class="hero-subtitle">Doomscroll Damage Control</p>
        <nav class="hero-links" aria-label="Extension links">
          <a class="hero-link" href="docs/README.md" target="_blank" rel="noreferrer">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 4h8l4 4v12a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"></path>
              <path d="M15 4v4h4"></path>
              <path d="M9 13h6"></path>
              <path d="M9 17h4"></path>
            </svg>
            <span>Docs</span>
          </a>
          <a class="hero-link" href="docs/privacy-policy.md" target="_blank" rel="noreferrer">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3l7 3v6c0 5-3.4 8-7 9-3.6-1-7-4-7-9V6l7-3Z"></path>
              <path d="m9.5 12 1.8 1.8 3.7-3.8"></path>
            </svg>
            <span>Privacy</span>
          </a>
          <a class="hero-link" href="docs/support.md" target="_blank" rel="noreferrer">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 20c4.4 0 8-3.1 8-7s-3.6-7-8-7-8 3.1-8 7c0 2.2 1.1 4.1 2.9 5.4V21l2.6-1.6c.8.2 1.7.3 2.5.3Z"></path>
              <path d="M9.6 10.2a2.4 2.4 0 1 1 4.6.8c-.3.8-1.1 1.1-1.7 1.7-.4.4-.5.7-.5 1.3"></path>
              <path d="M12 17h.01"></path>
            </svg>
            <span>Support</span>
          </a>
        </nav>
      </header>
      
      <div class="tabs-container">
        <nav class="tabs">
          <button class="tab-button active" data-target="facebook-panel">
            <span class="platform-icon fb-icon"></span>Facebook
          </button>
          <button class="tab-button" data-target="youtube-panel">
            <span class="platform-icon yt-icon"></span>YouTube
          </button>
        </nav>

        <div class="panels">
          <section id="facebook-panel" class="platform-panel active">
            <div class="toggle-list">
              <label class="toggle-card">
                <div class="card-content">
                  <span class="card-title">Reels</span>
                  <span class="card-desc">Tiny slot machine, infinite pull lever.</span>
                </div>
                <span class="switch">
                  <input id="facebook-reels" type="checkbox" role="switch" />
                  <span class="switch-ui" aria-hidden="true"></span>
                </span>
              </label>
              <label class="toggle-card">
                <div class="card-content">
                  <span class="card-title">Video surfaces</span>
                  <span class="card-desc">For when the feed suddenly wants to become television.</span>
                </div>
                <span class="switch">
                  <input id="facebook-videos" type="checkbox" role="switch" />
                  <span class="switch-ui" aria-hidden="true"></span>
                </span>
              </label>
              <label class="toggle-card">
                <div class="card-content">
                  <span class="card-title">Stories</span>
                  <span class="card-desc">Attendance checking, but vertical.</span>
                </div>
                <span class="switch">
                  <input id="facebook-stories" type="checkbox" role="switch" />
                  <span class="switch-ui" aria-hidden="true"></span>
                </span>
              </label>
            </div>
          </section>

          <section id="youtube-panel" class="platform-panel">
            <div class="toggle-list">
              <label class="toggle-card">
                <div class="card-content">
                  <span class="card-title">Shorts</span>
                  <span class="card-desc">Fast snacks for your attention span.</span>
                </div>
                <span class="switch">
                  <input id="youtube-shorts" type="checkbox" role="switch" />
                  <span class="switch-ui" aria-hidden="true"></span>
                </span>
              </label>
            </div>
          </section>
        </div>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
