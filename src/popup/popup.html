<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leave Me Alone</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="popup">
      <section id="main-view" class="popup-view active" aria-label="Controls">
        <header class="hero">
          <button
            id="open-links-view"
            class="hero-action"
            type="button"
            aria-label="Open links and support"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M12 10v6"></path>
              <path d="M12 7h.01"></path>
            </svg>
          </button>
          <div class="hero-logo-container">
            <img class="hero-logo" src="icons/icon-128.png" alt="Leave Me Alone logo" />
          </div>
          <h1 class="hero-title">Leave Me Alone</h1>
          <p class="hero-subtitle">Doomscroll Damage Control</p>
        </header>

        <div class="tabs-container">
          <nav class="tabs">
            <button class="tab-button active" data-target="facebook-panel">
              <span class="platform-icon fb-icon"></span>Facebook
            </button>
            <button class="tab-button" data-target="youtube-panel">
              <span class="platform-icon yt-icon"></span>YouTube
            </button>
          </nav>

          <div class="panels">
            <section id="facebook-panel" class="platform-panel active">
              <div class="toggle-list">
                <label class="toggle-card">
                  <div class="card-content">
                    <span class="card-title">Reels</span>
                    <span class="card-desc">Tiny slot machine, infinite pull lever.</span>
                  </div>
                  <span class="switch">
                    <input id="facebook-reels" type="checkbox" role="switch" />
                    <span class="switch-ui" aria-hidden="true"></span>
                  </span>
                </label>
                <label class="toggle-card">
                  <div class="card-content">
                    <span class="card-title">Video surfaces</span>
                    <span class="card-desc">For when the feed suddenly wants to become television.</span>
                  </div>
                  <span class="switch">
                    <input id="facebook-videos" type="checkbox" role="switch" />
                    <span class="switch-ui" aria-hidden="true"></span>
                  </span>
                </label>
                <label class="toggle-card">
                  <div class="card-content">
                    <span class="card-title">Stories</span>
                    <span class="card-desc">Attendance checking, but vertical.</span>
                  </div>
                  <span class="switch">
                    <input id="facebook-stories" type="checkbox" role="switch" />
                    <span class="switch-ui" aria-hidden="true"></span>
                  </span>
                </label>
              </div>
            </section>

            <section id="youtube-panel" class="platform-panel">
              <div class="toggle-list">
                <label class="toggle-card">
                  <div class="card-content">
                    <span class="card-title">Shorts</span>
                    <span class="card-desc">Fast snacks for your attention span.</span>
                  </div>
                  <span class="switch">
                    <input id="youtube-shorts" type="checkbox" role="switch" />
                    <span class="switch-ui" aria-hidden="true"></span>
                  </span>
                </label>
              </div>
            </section>
          </div>
        </div>
      </section>

      <section id="links-view" class="popup-view" aria-label="Links">
        <header class="subpage-header">
          <button id="close-links-view" class="subpage-back" type="button" aria-label="Back">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 18 9 12l6-6"></path>
            </svg>
          </button>
          <div>
            <p class="subpage-eyebrow">Leave Me Alone</p>
            <h2 class="subpage-title">Links</h2>
          </div>
        </header>

        <div class="toggle-list link-list">
          <a
            class="link-card"
            href="https://github.com/indiglox/leavemealone"
            target="_blank"
            rel="noreferrer"
          >
            <div class="card-content">
              <span class="card-title">GitHub</span>
              <span class="card-desc">Source, issues, and release history.</span>
            </div>
            <span class="link-pill">Open</span>
          </a>
          <a
            class="link-card"
            href="https://github.com/indiglox/leavemealone/blob/HEAD/docs/privacy-policy.md"
            target="_blank"
            rel="noreferrer"
          >
            <div class="card-content">
              <span class="card-title">Privacy policy</span>
              <span class="card-desc">The public markdown page used for submission.</span>
            </div>
            <span class="link-pill">Open</span>
          </a>
          <a
            class="link-card"
            href="https://github.com/indiglox/leavemealone/blob/HEAD/docs/support.md"
            target="_blank"
            rel="noreferrer"
          >
            <div class="card-content">
              <span class="card-title">Support</span>
              <span class="card-desc">Help, issue reporting, and reviewer notes.</span>
            </div>
            <span class="link-pill">Open</span>
          </a>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
